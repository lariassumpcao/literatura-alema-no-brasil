<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Shadow filter -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-color="#1a0e05" flood-opacity="0.5"/>
    </filter>
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-color="#0a0500" flood-opacity="0.4"/>
    </filter>
    <!-- Gradient for aged look -->
    <linearGradient id="agedGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.05"/>
      <stop offset="50%" stop-color="#000" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="pageGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5edd0"/>
      <stop offset="50%" stop-color="#e8dbb8"/>
      <stop offset="100%" stop-color="#d4c49a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="12" fill="#2c1810"/>
  <rect width="128" height="128" rx="12" fill="url(#agedGrad)"/>

  <!-- ============ BOOK 1 - GERMANY (leaning right, behind) ============ -->
  <g filter="url(#shadow)">
    <!-- Book body -->
    <rect x="20" y="30" width="40" height="70" rx="2" fill="#1a1a1a" transform="rotate(8, 40, 65)"/>
    <!-- German flag on cover -->
    <rect x="24" y="36" width="32" height="12" rx="1" fill="#000000" transform="rotate(8, 40, 65)"/>
    <rect x="24" y="48" width="32" height="12" rx="1" fill="#dd0000" transform="rotate(8, 40, 65)"/>
    <rect x="24" y="60" width="32" height="12" rx="1" fill="#ffce00" transform="rotate(8, 40, 65)"/>
    <!-- Book spine -->
    <rect x="18" y="30" width="6" height="70" rx="1" fill="#0d0d0d" transform="rotate(8, 40, 65)"/>
    <!-- Pages edge -->
    <rect x="58" y="33" width="4" height="64" rx="0.5" fill="url(#pageGrad)" transform="rotate(8, 40, 65)" opacity="0.8"/>
    <!-- Gold text on spine -->
    <!-- <text x="21" y="70" font-size="7" fill="#c9a84c" font-family="serif" text-anchor="middle" transform="rotate(8, 40, 65)" writing-mode="tb" letter-spacing="2">DEUTSCHLAND</text> -->
  </g>

  <!-- ============ BOOK 2 - BRAZIL (upright, front center) ============ -->
  <g filter="url(#shadow)">
    <!-- Book body -->
    <rect x="44" y="22" width="44" height="78" rx="2" fill="#006633"/>
    <!-- Brazilian flag on cover -->
    <rect x="48" y="28" width="36" height="36" rx="1" fill="#009739"/>
    <!-- Yellow diamond -->
    <polygon points="66,33 79,46 66,59 53,46" fill="#fedf00"/>
    <!-- Blue circle -->
    <circle cx="66" cy="46" r="9" fill="#012169"/>
    <!-- White band with text -->
    <path d="M57,46 Q66,42 75,46" stroke="white" stroke-width="2.5" fill="none"/>
    <!-- Southern Cross stars (simplified) -->
    <circle cx="62" cy="43" r="1.2" fill="white"/>
    <circle cx="68" cy="41" r="1" fill="white"/>
    <circle cx="70" cy="47" r="1.2" fill="white"/>
    <circle cx="64" cy="49" r="1" fill="white"/>
    <circle cx="60" cy="48" r="0.8" fill="white"/>
    <!-- Book spine -->
    <rect x="42" y="22" width="6" height="78" rx="1" fill="#004d26"/>
    <!-- Pages edge -->
    <rect x="86" y="25" width="4" height="72" rx="0.5" fill="url(#pageGrad)" opacity="0.8"/>
    <!-- Gold text on spine -->
    <!-- <text x="45" y="65" font-size="7" fill="#c9a84c" font-family="serif" text-anchor="middle" writing-mode="tb" letter-spacing="2">BRASIL</text> -->
  </g>

  <!-- ============ BOOK 3 - GERMANY (leaning left, in front) ============ -->
  <g filter="url(#shadow)">
    <!-- Book body -->
    <rect x="68" y="35" width="38" height="65" rx="2" fill="#1a1a1a" transform="rotate(-6, 87, 67)"/>
    <!-- German flag on cover -->
    <rect x="72" y="41" width="30" height="11" rx="1" fill="#000000" transform="rotate(-6, 87, 67)"/>
    <rect x="72" y="52" width="30" height="11" rx="1" fill="#dd0000" transform="rotate(-6, 87, 67)"/>
    <rect x="72" y="63" width="30" height="11" rx="1" fill="#ffce00" transform="rotate(-6, 87, 67)"/>
    <!-- Book spine -->
    <rect x="104" y="35" width="6" height="65" rx="1" fill="#0d0d0d" transform="rotate(-6, 87, 67)"/>
    <!-- Pages edge -->
    <rect x="66" y="38" width="4" height="59" rx="0.5" fill="url(#pageGrad)" transform="rotate(-6, 87, 67)" opacity="0.8"/>
    <!-- Gold text on spine -->
    <!-- <text x="107" y="72" font-size="6.5" fill="#c9a84c" font-family="serif" text-anchor="middle" transform="rotate(-6, 87, 67)" writing-mode="tb" letter-spacing="2">DEUTSCH</text> -->
  </g>

  <!-- ============ Decorative elements ============ -->
  
  <!-- Subtle aged spots -->
  <circle cx="50" cy="95" r="3" fill="#5c3a1a" opacity="0.15"/>
  <circle cx="90" cy="20" r="2" fill="#5c3a1a" opacity="0.12"/>
  <circle cx="30" cy="102" r="2.5" fill="#5c3a1a" opacity="0.1"/>
  <circle cx="105" cy="100" r="2" fill="#5c3a1a" opacity="0.08"/>

  <!-- Warm vignette overlay -->
  <rect width="128" height="128" rx="12" fill="url(#agedGrad)" opacity="0.15"/>

  <!-- Subtle border -->
  <rect width="128" height="128" rx="12" fill="none" stroke="#1a0e05" stroke-width="2" opacity="0.4"/>
</svg>